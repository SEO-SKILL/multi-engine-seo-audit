# Naver DIA / DIA+ 算法（Deep Intent Analysis）
# 创建：2026-06-10

file_version: "1.0"
file_purpose: "Naver DIA+ 深度意图分析适配"
maintainer: kelly@example.com
locale_focus: ko

rules:

  - id: naver.dia.search-intent-match
    source: naver-search-advisor
    severity: high
    confidence_default: 0.78
    applies_to:
      page_types: [all]
      platforms: [naver]
      locales: [ko]
    detector:
      type: llm_judge
      prompt_template: prompts/naver_intent_match_judge.md
      model: sonnet
      inputs: [title, h1, visible_text, target_query]
      args:
        intent_categories:
          - informational  # 想了解
          - transactional  # 想买/想交易
          - navigational   # 找特定品牌/平台
          - investigational # 比较/研究
    platform_business_impact: |
      Naver DIA 算法判断"用户搜索意图 vs 页面提供内容"匹配度。
      韩国用户搜"비트코인 사는 법"（如何买比特币）= transactional + investigational。
      工具页不应优化纯 informational 关键词。
    tags: [naver, dia, intent]

  - id: naver.dia.content-completeness
    source: naver-search-advisor
    severity: medium
    confidence_default: 0.82
    applies_to:
      page_types: [learn, support, faq]
      platforms: [naver]
      locales: [ko]
    detector:
      type: llm_judge
      prompt_template: prompts/naver_completeness_judge.md
      model: haiku
      inputs: [visible_text, query]
      args:
        signals:
          - 是否完整回答 query
          - 用户读完是否仍需再搜
          - 是否涵盖相关子问题
    platform_business_impact: |
      Naver DIA+ 偏好"完整回答"，避免用户回到 Naver 再搜。
      Platform /learn 内容应在 H2 层面覆盖所有相关子问题。
    tags: [naver, dia, completeness]
