# Naver 深度规则集（V2 补完）
# 补 AiRSearch / Smart Block / Knowledge iN / Mobile / HTTPS / Webmaster
# 创建：2026-06-12

file_version: "1.0"
maintainer: kelly@example.com
locale_focus: ko
source_doc:
  url: https://searchadvisor.naver.com/guide/seo-naver-rank
  pulled_at: 2026-06-12

rules:
  # === AiRSearch（Naver 2023 新一代 AI 搜索算法）===
  - id: naver.airsearch.content-coherence
    source: naver-search-advisor
    severity: high
    confidence_default: 0.75
    applies_to: {page_types: [news, blog, learn, support, questions], platforms: [naver], locales: [ko]}
    detector:
      type: hybrid
      fn: detectors.naver.content_coherence_check
      inputs: [visible_text]
    business_impact: |
      Naver 2023 推出 AiRSearch（AI Research）替代部分 C-Rank 功能。
      AiRSearch 算法用 BERT 类模型评估韩文内容连贯性 + 主题深度。
      机翻 / 拼凑韩文页直接降权。
    tags: [naver, airsearch, ai, content-quality]

  # === Smart Block（Naver SERP 结构化集成）===
  - id: naver.smart-block.structured-content
    source: naver-search-advisor
    severity: medium
    confidence_default: 0.70
    applies_to: {page_types: [learn, support, faq, questions], platforms: [naver], locales: [ko]}
    detector:
      type: hard_rule
      fn: detectors.naver.smart_block_check
      inputs: [raw_html]
    business_impact: |
      Naver Smart Block 在 SERP 顶部展示结构化内容（FAQ / How-to / 列表）。
      Platform /support /learn 韩文页应该输出 FAQPage / HowTo schema 进入 Smart Block。
    tags: [naver, smart-block, schema]

  # === Knowledge iN (지식인) Q&A 集成 ===
  - id: naver.knowledge-in.qa-citation
    source: naver-search-advisor
    severity: low
    confidence_default: 0.65
    applies_to: {page_types: [faq, support, questions], platforms: [naver], locales: [ko]}
    detector:
      type: hard_rule
      fn: detectors.naver.knowledge_in_check
      inputs: [raw_html, visible_text]
    business_impact: |
      Naver Knowledge iN (지식인) 是韩国最大 Q&A 平台。
      在 Platform 页提到 지식인 链接 / 引用提升本地化信号。
    tags: [naver, knowledge-in, qa]

  # === Naver Mobile-First（韩国移动用户 80%+）===
  - id: naver.mobile.viewport-required
    source: naver-search-advisor
    severity: high
    confidence_default: 0.92
    applies_to: {page_types: [all], platforms: [naver], locales: [ko]}
    detector:
      type: hard_rule
      fn: detectors.naver.mobile_friendly_check
      inputs: [raw_html]
    business_impact: |
      韩国移动搜索 80%+ 来自 Naver App。
      Platform 韩文页缺 viewport meta 直接被移动 SERP 严重降权。
    tags: [naver, mobile, viewport]

  # === Naver HTTPS 强制 ===
  - id: naver.security.https-required
    source: naver-search-advisor
    severity: high
    confidence_default: 0.92
    applies_to: {page_types: [all], platforms: [naver], locales: [ko]}
    detector:
      type: hard_rule
      fn: detectors.naver.https_check
      inputs: [page_url]
    business_impact: |
      Naver 2018+ HTTPS 是排名因素，金融 YMYL 页面尤其严格。
      Platform 任何 http:// 韩文页面用户跳出率严重升高。
    tags: [naver, https, security]

  # === Naver Webmaster Tools 验证 ===
  - id: naver.webmaster.site-verification-missing
    source: naver-search-advisor
    severity: low
    confidence_default: 0.85
    applies_to: {page_types: [domain], platforms: [naver], locales: [ko]}
    detector:
      type: hard_rule
      fn: detectors.naver.webmaster_verification_check
      inputs: [raw_html]
    business_impact: |
      未在 Naver Search Advisor 验证 = 拿不到收录数据 + 索引提交受限。
      Platform 应在 searchadvisor.naver.com 验证韩文站点。
    tags: [naver, webmaster, verification]
