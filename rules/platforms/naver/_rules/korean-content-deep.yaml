file_version: "1.0"
maintainer: kelly@example.com
locale_focus: ko

rules:
  - id: naver.content.no-korean-financial-context
    source: naver-search-advisor
    severity: medium
    confidence_default: 0.82
    applies_to: {page_types: [price, learn, how-to-buy], platforms: [naver], locales: [ko]}
    detector: {type: llm_judge, prompt_template: prompts/naver_korean_finance_judge.md, model: sonnet}
    platform_business_impact: "韩国金融语境（KRW / 韩国监管 / 韩国税务）"
    tags: [naver, korean, finance]

  - id: naver.content.no-korean-payment-method
    source: naver-search-advisor
    severity: low
    confidence_default: 0.85
    applies_to: {page_types: [how-to-buy], platforms: [naver], locales: [ko]}
    detector: {type: hard_rule, fn: detectors.naver.korean_payment_check, inputs: [page_content]}
    platform_business_impact: "韩国 how-to-buy 页应提及 KakaoPay / Toss / 韩国银行转账等本地支付"
    tags: [naver, korean, payment]

  - id: naver.content.cyrillic-or-cjk-mix
    source: naver-search-advisor
    severity: low
    confidence_default: 0.90
    applies_to: {page_types: [all], platforms: [naver], locales: [ko]}
    detector: {type: hard_rule, fn: detectors.naver.character_consistency, inputs: [visible_text]}
    platform_business_impact: "韩文页混用日文/中文字符让 Naver 怀疑机翻"
    tags: [naver, korean, character-set]
