file_version: "1.0"
maintainer: kelly@bydfi.com

rules:
  - id: google.kg.organization-incomplete
    source: google-search-central
    severity: medium
    confidence_default: 0.90
    applies_to: {page_types: [homepage, about], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.schema.organization_check, inputs: [jsonld]}
    bydfi_business_impact: "Organization schema 应有 name/url/logo/sameAs/foundingDate"
    tags: [knowledge-graph, organization, schema]

  - id: google.kg.sameas-missing
    source: google-search-central
    severity: low
    confidence_default: 0.92
    applies_to: {page_types: [homepage], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.schema.sameas_check, inputs: [jsonld]}
    bydfi_business_impact: "sameAs 应链接 Twitter/LinkedIn/Crunchbase/Wikipedia"
    tags: [knowledge-graph, sameas]

  - id: google.kg.entity-no-wikipedia
    source: google-search-central
    severity: info
    confidence_default: 0.85
    applies_to: {page_types: [homepage], platforms: [google]}
    detector: {type: external_api, fn: integrations.wikipedia.entity_check, inputs: [brand]}
    bydfi_business_impact: "Wikipedia 页提升知识图谱可信度"
    tags: [knowledge-graph, wikipedia]
