# Google Meta Description / Featured Snippet / Manual Action 申诉
# Will 知识库 7 个未对齐问题补完
file_version: "1.0"
maintainer: kelly@example.com
source_doc:
  url: https://developers.google.com/search/docs/appearance/snippet
  pulled_at: 2026-06-15

rules:
  - id: google.meta-description.missing
    source: google-search-central
    severity: medium
    confidence_default: 0.92
    applies_to: {page_types: [all], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.meta_desc.missing_or_short_check
      inputs: [head_meta]
    business_impact: |
      Meta description 缺失或 < 50 字符 = Google 自动生成可能不符合 Platform 品牌调性。
      Will 知识库点名 #4 "标题与元描述"。
    tags: [meta-description, snippet, manual-action-pattern]

  - id: google.meta-description.too-long-or-too-short
    source: google-search-central
    severity: low
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.meta_desc.length_check
      inputs: [head_meta]
    business_impact: |
      Meta description 推荐 120-160 字符。过短被截断，过长被忽略。
    tags: [meta-description, snippet]

  - id: google.featured-snippet.no-direct-answer
    source: google-search-central
    severity: medium
    confidence_default: 0.72
    applies_to: {page_types: [all], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.meta_desc.featured_snippet_check
      inputs: [raw_html, visible_text]
    business_impact: |
      Featured Snippet 偏爱「问句标题 + 50-60 字直接回答 + 列表/表格」结构。
      Platform /learn 想拿 0 位结果，必须输出此结构。Will 知识库 #6。
    tags: [featured-snippet, geo, ai-overviews]

  - id: google.manual-action.reconsideration-readiness
    source: google-search-central
    source_url: https://developers.google.com/search/docs/monitor-debug/manual-actions
    severity: high
    confidence_default: 0.65
    applies_to: {page_types: [domain], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.meta_desc.reconsideration_check
      inputs: [raw_html, page_url]
    business_impact: |
      Manual Action 申诉需要：清理违规 + 详细说明 + 改进证据。
      Platform 应预先准备 reconsideration request 模板。Will 知识库 #9 申诉与审核恢复。
    tags: [manual-action, reconsideration, appeal]
