# Google Core Updates 适配规则
# 创建：2026-06-10

file_version: "1.0"
file_purpose: "Google Core Update / Helpful Content / Spam Update 适配"
maintainer: kelly@example.com

# 历史更新时间线（daily-pull-agent 自动维护）
core_update_timeline:
  - date: 2026-05
    type: core_update
    name: "May 2026 Core Update"
    impact: 待评估
  - date: 2026-03
    type: spam_update
    name: "March 2026 Spam Update"
    impact: 加密 / fintech 行业冲击大

rules:

  - id: google.core-update.recent-traffic-drop
    source: google-search-central
    severity: high
    confidence_default: 0.85
    applies_to:
      page_types: [all]
      platforms: [google]
      commands: [watch]
    detector:
      type: external_api
      fn: integrations.gsc.traffic_drop_vs_core_update
      inputs: [url, gsc_data, core_update_dates]
      args:
        red_flag_drop_pct: 30
        time_window_days: 14
    platform_business_impact: |
      Core Update 后 14 天内流量下跌 > 30% = 高度可能受影响。
      触发 traffic drop SOP（参考操作手册 Google 自然流量下跌排查 SOP）。
    tags: [core-update, traffic-drop, sop-trigger]

  - id: google.helpful-content.signal-weak
    source: google-search-central
    severity: high
    confidence_default: 0.78
    applies_to:
      page_types: [learn, support, news, blog, crypto-review]
      platforms: [google]
    detector:
      type: llm_judge
      prompt_template: prompts/helpful_content_signal_judge.md
      model: sonnet
      inputs: [visible_text, page_purpose, author_metadata, sources]
    platform_business_impact: |
      Helpful Content 信号弱的页面在 Core Update 中容易被打击。
      Platform 应主动 audit 所有内容页，提前修复 Helpful Content 信号。
    tags: [helpful-content, core-update]

  - id: google.spam-update.scaled-content-risk
    source: google-spam-policy
    severity: high
    confidence_default: 0.82
    applies_to:
      page_types: [all]
      platforms: [google]
    detector:
      type: hybrid
      fn: detectors.spam.scaled_content_signals
      inputs: [page_inventory, content_similarity_matrix, template_detection]
      args:
        red_flags:
          - similar_pages_above_50
          - template_similarity_above_0.85
          - thin_content_ratio_above_0.30
    platform_business_impact: |
      程序化页面（/price/* /how-to-buy/*）必须每页有独特价值。
      Spam Update 主要打击规模化低增量内容。
    tags: [spam-update, scaled-content]
