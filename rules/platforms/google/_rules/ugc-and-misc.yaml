# Google UGC Spam / Lazy Loading / Soft 404 / Pagination / Q&A schema
# 一次性补完剩余 5 个小主题

file_version: "1.0"
maintainer: kelly@bydfi.com
source_doc:
  url: https://developers.google.com/search/docs/essentials/spam-policies#user-generated-spam
  pulled_at: 2026-06-12

rules:
  # === User-generated Spam（评论 / 论坛 / UGC 区 spam）===
  - id: google.ugc-spam.unmoderated-comments
    source: google-search-central
    source_url: https://developers.google.com/search/docs/essentials/spam-policies#user-generated-spam
    severity: medium
    confidence_default: 0.65
    applies_to: {page_types: [blog, learn, news, questions], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.spam_quality.ugc_spam_check
      inputs: [raw_html, visible_text]
    bydfi_business_impact: |
      评论区 / 论坛区如果有未审核的 spam 链接（赌博 / 色情 / 推广），整页连带降权。
      BYDFi 若有 UGC，必须 rel=nofollow / ugc 标记 + 人工审核。
    tags: [ugc-spam, comments]

  # === Lazy Loading 验证 ===
  - id: google.lazy-loading.misused-or-missing
    source: google-search-central
    source_url: https://web.dev/articles/lazy-loading-images
    severity: low
    confidence_default: 0.78
    applies_to: {page_types: [all], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.spam_quality.lazy_loading_check
      inputs: [raw_html]
    bydfi_business_impact: |
      首屏关键图片不能 loading="lazy"（影响 LCP）。
      首屏外的图片应该 loading="lazy"（节省带宽）。
      BYDFi 主页 hero 图片若用 lazy，LCP 严重退化。
    tags: [lazy-loading, performance]

  # === Soft 404 处理 ===
  - id: google.soft-404.empty-or-not-found
    source: google-search-central
    source_url: https://developers.google.com/search/docs/crawling-indexing/http-network-errors#soft-404-errors
    severity: medium
    confidence_default: 0.78
    applies_to: {page_types: [all], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.spam_quality.soft_404_check
      inputs: [raw_html, visible_text, status_code]
    bydfi_business_impact: |
      返回 200 但内容显示"页面未找到 / 暂无数据 / 即将上线"= Soft 404。
      Google 浪费爬虫预算 + 索引为低质页。BYDFi 应返回真正的 404 状态码。
    tags: [soft-404, index-coverage]

  # === Pagination ===
  - id: google.pagination.next-prev-or-canonical
    source: google-search-central
    severity: low
    confidence_default: 0.70
    applies_to: {page_types: [all], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.spam_quality.pagination_check
      inputs: [raw_html, page_url]
    bydfi_business_impact: |
      虽然 Google 2019 弃用 rel=next/prev 信号，但分页列表仍需要 canonical 指向自己（不是 page 1），
      或使用 view-all 页面统一索引。BYDFi /learn /blog 分页应处理。
    tags: [pagination]

  # === Q&A schema 单独（区别于 FAQPage）===
  - id: google.schema.qapage-missing
    source: google-search-central
    source_url: https://developers.google.com/search/docs/appearance/structured-data/qapage
    severity: low
    confidence_default: 0.72
    applies_to: {page_types: [questions, support], platforms: [google]}
    detector:
      type: hard_rule
      fn: detectors.spam_quality.qapage_schema_check
      inputs: [raw_html]
    bydfi_business_impact: |
      QAPage schema 与 FAQPage 不同：QAPage 是单一问题 + 多答案场景（论坛 / Q&A 平台）。
      BYDFi /questions 类页面应用 QAPage 而非 FAQPage。
    tags: [schema, qapage]
