file_version: "1.0"
maintainer: kelly@example.com

rules:
  - id: google.news.publisher-center-not-registered
    source: google-search-central
    severity: low
    confidence_default: 0.95
    applies_to: {page_types: [news], platforms: [google]}
    detector: {type: external_api, fn: integrations.gsc.publisher_center_check, inputs: [domain]}
    platform_business_impact: "Google News + Publisher Center 注册是 News 富结果前提"
    tags: [news, google-news]

  - id: google.news.newsarticle-schema-incomplete
    source: google-search-central
    severity: medium
    confidence_default: 0.92
    applies_to: {page_types: [news], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.schema.newsarticle_completeness, inputs: [jsonld]}
    platform_business_impact: "NewsArticle 必备：headline / author / datePublished / publisher / image"
    tags: [news, schema]

  - id: google.news.bylines-clickable
    source: google-search-central
    severity: medium
    confidence_default: 0.85
    applies_to: {page_types: [news], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.news.byline_clickable, inputs: [dom_links]}
    platform_business_impact: "Top stories 偏好 clickable byline"
    tags: [news, author]

  - id: google.news.lastreviewed-stale
    source: google-search-central
    severity: medium
    confidence_default: 0.90
    applies_to: {page_types: [news], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.news.review_freshness_check, inputs: [jsonld]}
    platform_business_impact: "金融新闻 > 30 天未更新流量衰减明显"
    tags: [news, freshness]

  - id: google.news.preferred-source-eligibility
    source: google-search-central
    severity: info
    confidence_default: 0.75
    applies_to: {page_types: [news], platforms: [google]}
    detector: {type: llm_judge, prompt_template: prompts/preferred_source_eligibility.md, model: haiku}
    platform_business_impact: "首选来源（Preferred Sources）扩展到所有语言（参考 Will 5/28 更新日志）"
    tags: [news, preferred-source]
