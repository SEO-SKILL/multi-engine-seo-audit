# Google hreflang 一致性规则
# 创建：2026-06-10
# 对标 MEXC 事故 L03：hreflang + robots + canonical 信号冲突

file_version: "1.0"
file_purpose: "hreflang 配置一致性、可抓取性、语言匹配检测"
maintainer: kelly@example.com
last_reviewed_at: 2026-06-10
source_doc:
  url: https://developers.google.com/search/docs/specialty/international/localized-versions
  last_updated: 2025-10-20
  pulled_at: 2026-06-10

rules:

  - id: google.hreflang.alternate-returns-404
    source: platform-incident
    severity: high
    confidence_default: 0.99
    applies_to:
      page_types: [all]
      platforms: [google, bing]
      commands: [audit, gate, watch]
    detector:
      type: hard_rule
      fn: detectors.hreflang.alternate_validity
      inputs: [hreflang_alternates, fetched_status_per_alternate]
      args:
        sample_rate: 100   # 全量抽查
        cache_ttl_hours: 24
    patch_hint:
      template: patches/remove_invalid_hreflang.diff.j2
      priority: P0
      auto_apply: yes_with_diff_preview
    fixtures:
      positive: fixtures/bad-hreflang-404.html
      negative: fixtures/good-hreflang.html
    platform_business_impact: |
      MEXC 事故 L03：alternate 返回 404 → Google 忽略整组 hreflang。
      所有 alternate 必须真实存在且可访问。
    tags: [platform-critical, hreflang, mexc-incident]

  - id: google.hreflang.alternate-blocked-by-robots
    source: platform-incident
    severity: high
    confidence_default: 0.97
    applies_to:
      page_types: [all]
      platforms: [google, bing]
    detector:
      type: hard_rule
      fn: detectors.hreflang.alternate_robots_check
      inputs: [hreflang_alternates, robots_txt_parsed]
    patch_hint:
      template: patches/fix_hreflang_robots_conflict.diff.j2
      priority: P0
      auto_apply: false
      requires_review: true
    platform_business_impact: |
      MEXC 事故 L03 核心：hreflang 输出了 `/bg-BG/news/1057200`，
      但 robots.txt 禁止 `/bg-BG/news/*`。Google 看到这种矛盾会忽略 hreflang。
    tags: [platform-critical, hreflang, robots, mexc-incident]
    human_review_required: true

  - id: google.hreflang.language-mismatch
    source: google-search-central
    severity: high
    confidence_default: 0.82
    applies_to:
      page_types: [all]
      platforms: [google]
    detector:
      type: hybrid
      fn: detectors.hreflang.language_content_match
      inputs: [hreflang_alternates, fetched_alternate_content]
      args:
        language_detection: cld3_or_fasttext
        confidence_threshold: 0.85
    llm_judge:
      enabled: true
      when: detector.confidence < 0.75
      prompt_template: prompts/hreflang_language_judge.md
      model: haiku
    platform_business_impact: |
      MEXC 事故 L03 子问题：部分 alternate 声明是 `en-TR` 但内容是英文（不是土耳其语）。
      hreflang 必须真实反映 alternate 页面的语言。
    tags: [hreflang, localization-quality]

  - id: google.hreflang.missing-return-tag
    source: google-search-central
    severity: medium
    confidence_default: 0.95
    applies_to:
      page_types: [all]
      platforms: [google]
    detector:
      type: hard_rule
      fn: detectors.hreflang.return_tag_check
      inputs: [hreflang_alternates, fetched_alternate_hreflang]
    patch_hint:
      template: patches/add_hreflang_return_tags.diff.j2
      priority: P1
    platform_business_impact: |
      hreflang 必须是双向的：A 声明 B 是 ko 版本，B 也必须声明 A 是相应版本。
    tags: [hreflang, bidirectional]

  - id: google.hreflang.canonical-not-self
    source: google-search-central
    severity: high
    confidence_default: 0.93
    applies_to:
      page_types: [all]
      platforms: [google]
    detector:
      type: hard_rule
      fn: detectors.hreflang.canonical_self_check
      inputs: [hreflang_alternates, canonical_per_alternate]
    platform_business_impact: |
      每个语言版本的 canonical 必须指向自己。
      不能让所有语言版本都 canonical 到英文版（否则等于告诉 Google 其他语言版本都是重复内容）。
    tags: [hreflang, canonical]

  - id: google.hreflang.x-default-handling
    source: google-search-central
    severity: low
    confidence_default: 0.88
    applies_to:
      page_types: [all]
      platforms: [google]
    detector:
      type: hard_rule
      fn: detectors.hreflang.x_default_check
      inputs: [hreflang_alternates]
    platform_business_impact: |
      建议有 x-default 兜底（用于未匹配的 locale 用户）。
      Platform 9 语言版本默认应有 x-default 指向 en。
    tags: [hreflang, x-default]
