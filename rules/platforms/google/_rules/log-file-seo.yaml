file_version: "1.0"
maintainer: kelly@bydfi.com

rules:
  - id: google.log.googlebot-crawl-frequency-low
    source: google-search-central
    severity: medium
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [google], commands: [watch]}
    detector: {type: external_api, fn: integrations.cloudflare.googlebot_freq_check, inputs: [url, log_range]}
    bydfi_business_impact: "Googlebot 抓取频率低 = 内容鲜度信号弱"
    tags: [log-file, crawl-frequency]

  - id: google.log.error-rate-high
    source: google-search-central
    severity: high
    confidence_default: 0.95
    applies_to: {page_types: [all], platforms: [google], commands: [watch]}
    detector: {type: external_api, fn: integrations.cloudflare.error_rate_check, inputs: [log_range]}
    bydfi_business_impact: "Googlebot 5xx 错误率 > 5% = 影响索引"
    tags: [log-file, error-rate]

  - id: google.log.crawl-anomaly-spike
    source: google-search-central
    severity: medium
    confidence_default: 0.80
    applies_to: {page_types: [all], platforms: [google], commands: [watch]}
    detector: {type: external_api, fn: integrations.cloudflare.spike_detection, inputs: [log_range]}
    bydfi_business_impact: "Googlebot 突然激增/锐减 = 算法变化或我方策略变化"
    tags: [log-file, anomaly]
