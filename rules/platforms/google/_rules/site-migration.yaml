# Google Site Migration / Hosting 迁移规则
# 创建：2026-06-10
# 来源：https://developers.google.com/search/docs/crawling-indexing/site-move-no-url-changes
# 战略价值：Platform 未来 CDN 切换 / 主机迁移防 SEO 流量崩盘

file_version: "1.0"
file_purpose: "网站托管/CDN 迁移期 SEO 检查规则"
maintainer: kelly@example.com
source_doc:
  url: https://developers.google.com/search/docs/crawling-indexing/site-move-no-url-changes
  pulled_at: 2026-06-10

rules:

  - id: google.migration.staging-not-noindex
    source: google-search-central
    severity: blocker
    confidence_default: 0.95
    applies_to:
      page_types: [domain]
      platforms: [google, shared]
      commands: [audit, gate]
    detector:
      type: hybrid
      fn: detectors.migration.staging_indexability_check
      inputs: [domain, raw_html, meta_robots]
      args:
        red_flag_staging_pattern: "beta.|staging.|preview.|test."
        require_noindex: true
    platform_business_impact: |
      新基础架构上线前临时主机（beta.example.com）必须有 noindex。
      意外索引 staging 内容 = 双倍重复内容 + 用户进入测试环境。
    tags: [migration, staging, noindex, critical]
    human_review_required: true

  - id: google.migration.robots-blocking-stuck
    source: google-search-central
    severity: blocker
    confidence_default: 0.99
    applies_to:
      page_types: [domain]
      platforms: [google, shared]
      commands: [audit, watch]
    detector:
      type: hard_rule
      fn: detectors.migration.staging_robots_leftover_check
      inputs: [robots_txt, deployment_metadata]
    platform_business_impact: |
      迁移完成后忘了移除 staging 时的 'Disallow: /' robots.txt。
      这会让生产站全站消失。是迁移最常见事故。
    tags: [migration, robots, critical]
    human_review_required: true

  - id: google.migration.dns-ttl-not-lowered
    source: google-search-central
    severity: medium
    confidence_default: 0.85
    applies_to:
      page_types: [domain]
      platforms: [google, shared]
      commands: [audit]
    detector:
      type: external_api
      fn: integrations.dns.ttl_check
      inputs: [domain]
      args:
        recommended_max_ttl_before_migration: 3600
    platform_business_impact: |
      Google 文档：迁移前 1 周应降低 DNS TTL（推荐几小时）。
      不降 → ISP 缓存让部分用户访问旧服务器数天。
    tags: [migration, dns, ttl]

  - id: google.migration.gsc-verification-lost
    source: google-search-central
    severity: high
    confidence_default: 0.95
    applies_to:
      page_types: [domain]
      platforms: [google]
      commands: [audit, gate]
    detector:
      type: hybrid
      fn: detectors.migration.gsc_verification_check
      inputs: [domain, verification_meta, dns_txt]
      args:
        check_methods:
          - HTML file (/google[token].html)
          - meta tag in <head>
          - DNS TXT record
          - Google Analytics
    platform_business_impact: |
      Google 文档：HTML 文件验证 / meta 验证 / DNS TXT 在新副本中必须保留。
      丢失 = GSC 看不到迁移后数据。
    tags: [migration, gsc, verification]

  - id: google.migration.googlebot-access-not-tested
    source: google-search-central
    severity: high
    confidence_default: 0.92
    applies_to:
      page_types: [domain]
      platforms: [google]
      commands: [audit, gate]
    detector:
      type: external_api
      fn: integrations.gsc.url_inspection_check
      inputs: [domain]
    platform_business_impact: |
      迁移前必须用 GSC URL 检查工具确认 Googlebot 能访问新基础架构。
      防火墙/CDN/DoS 配置错误可能阻断 Googlebot。
    tags: [migration, googlebot, access]

  - id: google.migration.crawl-stats-anomaly
    source: google-search-central
    severity: medium
    confidence_default: 0.80
    applies_to:
      page_types: [domain]
      platforms: [google]
      commands: [watch]
    detector:
      type: external_api
      fn: integrations.gsc.crawl_stats_anomaly_check
      inputs: [property, time_range]
      args:
        red_flag_drop_pct: 50
        red_flag_5xx_spike: 0.10
    platform_business_impact: |
      迁移后 Googlebot 抓取速度有短暂下降是正常的。
      但持续下降 + 5xx 突增 = 新基础架构有问题。
    tags: [migration, crawl-stats, watch]

  - id: google.migration.dual-serving-detected
    source: google-search-central
    severity: high
    confidence_default: 0.88
    applies_to:
      page_types: [domain]
      platforms: [google]
      commands: [audit, watch]
    detector:
      type: hybrid
      fn: detectors.migration.dual_serving_check
      inputs: [old_server_logs, new_server_logs]
      args:
        red_flag_traffic_split_persisting_days: 7
    platform_business_impact: |
      Google 文档：迁移后新旧服务器流量应快速倾斜（旧 → 0）。
      持续双服务 = DNS 缓存问题或部分用户被 ISP 缓存到旧 IP。
    tags: [migration, dual-serving]

  - id: google.migration.cdn-not-verified-in-gsc
    source: google-search-central
    severity: medium
    confidence_default: 0.90
    applies_to:
      page_types: [domain]
      platforms: [google]
      commands: [audit]
    detector:
      type: external_api
      fn: integrations.gsc.cdn_verification_check
      inputs: [domain, image_sitemaps]
    platform_business_impact: |
      Google 文档：用 CDN 托管图片应在 GSC 验证 CDN 域名所有权。
      否则收不到抓取错误通知。
    tags: [migration, cdn, gsc]
