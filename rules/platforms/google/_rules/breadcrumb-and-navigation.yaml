# Google Breadcrumb + 网站层级结构
# 创建：2026-06-10

file_version: "1.0"
file_purpose: "Breadcrumb / 网站名称 / 站内导航 SEO"
maintainer: kelly@example.com

rules:

  - id: google.breadcrumb.schema-missing
    source: google-search-central
    source_url: https://developers.google.com/search/docs/appearance/structured-data/breadcrumb
    severity: low
    confidence_default: 0.99
    applies_to:
      page_types: [tools, learn, news, blog, price]
      platforms: [google]
    detector:
      type: hard_rule
      fn: detectors.schema.breadcrumblist_check
      inputs: [jsonld_parsed, page_url, page_hierarchy]
      args:
        require_self_in_list: true
        check_position_sequence: true
    patch_hint:
      template: patches/add_breadcrumb_schema.diff.j2
      priority: P2
      auto_apply: yes_with_diff_preview
    platform_business_impact: |
      BreadcrumbList schema 让 SERP 显示 breadcrumb 而不是 URL。
      Platform 工具页 / 学习页应该都有。
    tags: [breadcrumb, schema]

  - id: google.breadcrumb.visible-not-rendered
    source: google-search-central
    severity: low
    confidence_default: 0.92
    applies_to:
      page_types: [all]
      platforms: [google]
    detector:
      type: hybrid
      fn: detectors.navigation.breadcrumb_visible_check
      inputs: [rendered_dom, jsonld_parsed]
      args:
        require_schema_matches_visible: true
    platform_business_impact: |
      可见 breadcrumb 必须与 schema 一致（schema 真实性原则）。
    tags: [breadcrumb, visibility]

  - id: google.site-name.schema-missing
    source: google-search-central
    source_url: https://developers.google.com/search/docs/appearance/site-names
    severity: low
    confidence_default: 0.97
    applies_to:
      page_types: [homepage]
      platforms: [google]
    detector:
      type: hard_rule
      fn: detectors.schema.website_name_check
      inputs: [jsonld_parsed]
      args:
        require_organization_or_website: true
    platform_business_impact: |
      Organization / WebSite schema 帮助 Google SERP 显示"Platform"而不是 URL。
    tags: [site-name, schema, organization]

  - id: google.sitelinks.search-action
    source: google-search-central
    severity: info
    confidence_default: 0.90
    applies_to:
      page_types: [homepage]
      platforms: [google]
    detector:
      type: hard_rule
      fn: detectors.schema.sitelinks_searchbox_check
      inputs: [jsonld_parsed]
    platform_business_impact: |
      SearchAction schema 让 Google 在 Platform SERP 上显示搜索框。
    tags: [sitelinks, searchbox]
