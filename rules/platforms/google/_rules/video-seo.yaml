file_version: "1.0"
maintainer: kelly@example.com

rules:
  - id: google.video.schema-missing
    source: google-search-central
    severity: low
    confidence_default: 0.95
    applies_to: {page_types: [news, learn, blog], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.video.schema_check, inputs: [videos, jsonld]}
    platform_business_impact: "VideoObject schema 是视频富结果前提"
    tags: [video, schema]

  - id: google.video.thumbnail-missing
    source: google-search-central
    severity: medium
    confidence_default: 0.92
    applies_to: {page_types: [all], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.video.thumbnail_check, inputs: [videos, jsonld]}
    platform_business_impact: "视频 thumbnailUrl 必备"
    tags: [video, schema]

  - id: google.video.transcript-missing
    source: google-search-central
    severity: low
    confidence_default: 0.78
    applies_to: {page_types: [learn], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.video.transcript_check, inputs: [page_content]}
    platform_business_impact: "教学视频应配文字稿（SEO + 无障碍）"
    tags: [video, transcript, accessibility]

  - id: google.video.duration-missing
    source: google-search-central
    severity: low
    confidence_default: 0.95
    applies_to: {page_types: [all], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.video.duration_check, inputs: [jsonld]}
    platform_business_impact: "VideoObject.duration 必备"
    tags: [video, schema]

  - id: google.video.live-stream-schema
    source: google-search-central
    severity: info
    confidence_default: 0.90
    applies_to: {page_types: [news], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.video.live_check, inputs: [jsonld]}
    platform_business_impact: "直播应有 LiveBroadcast schema"
    tags: [video, live]
