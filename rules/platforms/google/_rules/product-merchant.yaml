file_version: "1.0"
maintainer: kelly@example.com

rules:
  - id: google.product.schema-incomplete
    source: google-search-central
    severity: medium
    confidence_default: 0.93
    applies_to: {page_types: [product, price], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.schema.product_completeness, inputs: [jsonld]}
    platform_business_impact: "Product schema 必备 name/offers/aggregateRating（前提是有可见评分）"
    tags: [product, schema]

  - id: google.product.hasAdultConsideration-required
    source: google-search-central
    severity: low
    confidence_default: 0.85
    applies_to: {page_types: [product], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.schema.adult_consideration_check, inputs: [jsonld, product_category]}
    platform_business_impact: "2026-05 新字段，加密/金融产品需评估是否声明"
    tags: [product, schema, new-field]

  - id: google.merchant.brand-name-mismatch
    source: google-search-central
    severity: medium
    confidence_default: 0.90
    applies_to: {page_types: [product], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.schema.brand_consistency, inputs: [jsonld, visible_brand]}
    platform_business_impact: "Product.brand 必须与可见品牌一致"
    tags: [product, brand, schema]

  - id: google.merchant.gtin-mpn-missing
    source: google-search-central
    severity: low
    confidence_default: 0.88
    applies_to: {page_types: [product], platforms: [google]}
    detector: {type: hard_rule, fn: detectors.schema.gtin_check, inputs: [jsonld]}
    platform_business_impact: "实物产品需要 GTIN/MPN（金融产品 N/A）"
    tags: [product, gtin]
