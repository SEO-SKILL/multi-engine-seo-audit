# Google 2024 Spam Policy Updates
# 2024-03 Core Update 引入的三类新 spam policy + AI Overviews + Reviews System
# 创建：2026-06-12

file_version: "1.0"
maintainer: kelly@bydfi.com
last_reviewed_at: 2026-06-12
last_synced_with_google: 2026-05-15
source_doc:
  url: https://developers.google.com/search/blog/2024/03/core-update-spam-policies
  pulled_at: 2026-06-12

rules:
  # === Site Reputation Abuse（寄生 SEO）===
  - id: google.spam-2024.site-reputation-abuse
    source: google-search-central
    source_url: https://developers.google.com/search/docs/essentials/spam-policies#site-reputation
    severity: blocker
    confidence_default: 0.85
    applies_to:
      page_types: [all]
      platforms: [google]
      commands: [audit, gate]
    detector:
      type: hybrid
      fn: detectors.google_2024.site_reputation_abuse_check
      inputs: [page_url, visible_text, raw_html]
    bydfi_business_impact: |
      Site Reputation Abuse（寄生 SEO）：在高权重域名上发布与主品牌无关的低质 / 第三方内容。
      BYDFi 若在 bydfi.com 上托管来自合作方的低质广告页 / 联盟营销页 → 直接被 Google 视为寄生 SEO。
      2024 5 月起 Google 开始大规模手工执法该规则。
    tags: [spam-2024, site-reputation-abuse, manual-action-risk, parasite-seo]

  # === Expired Domain Abuse ===
  - id: google.spam-2024.expired-domain-abuse
    source: google-search-central
    source_url: https://developers.google.com/search/docs/essentials/spam-policies#expired-domain-abuse
    severity: high
    confidence_default: 0.78
    applies_to:
      page_types: [domain]
      platforms: [google]
      commands: [audit, gate]
    detector:
      type: hard_rule
      fn: detectors.google_2024.expired_domain_abuse_check
      inputs: [page_url, domain_whois, raw_html]
    bydfi_business_impact: |
      用过期域名搭建新站借用历史权重 → Google 直接降权。
      BYDFi 自身域名安全（bydfi.com 一直自有），但收购的二级域名 / 营销活动域名需要警惕。
    tags: [spam-2024, expired-domain]

  # === Scaled Content Abuse 加强版 ===
  - id: google.spam-2024.scaled-ai-content
    source: google-search-central
    source_url: https://developers.google.com/search/docs/essentials/spam-policies#scaled-content
    severity: high
    confidence_default: 0.72
    applies_to:
      page_types: [all]
      platforms: [google]
      commands: [audit, gate, watch]
    detector:
      type: hybrid
      fn: detectors.google_2024.scaled_ai_content_check
      prompt_template: prompts/helpful_content_signal_judge.md
      inputs: [visible_text, page_purpose]
    bydfi_business_impact: |
      Google 2024 明确禁止大规模 AI 生成的低附加值内容。
      BYDFi /learn /price 等用 LLM 量产内容时必须保证编辑加工 + 实际价值。
      纯 AI 生成、未经编辑、堆量内容 → 视为 spam。
    tags: [spam-2024, scaled-content, ai-content, manual-action-risk]

  # === Reviews System Update（独立于 EEAT）===
  - id: google.reviews-system.in-depth-evaluation-missing
    source: google-search-central
    source_url: https://developers.google.com/search/blog/2023/04/reviews-update-april-2023
    severity: medium
    confidence_default: 0.72
    applies_to:
      page_types: [crypto-review, learn]
      platforms: [google]
    detector:
      type: llm_judge
      fn: detectors.google_2024.in_depth_review_check
      prompt_template: prompts/first_hand_experience_judge.md
      inputs: [visible_text, page_purpose]
    bydfi_business_impact: |
      Reviews System Update（持续 update）：评测/对比类内容必须有 in-depth 评估、
      第一手经验、定量数据、优缺点平衡。BYDFi 交易所对比 / 钱包评测必须满足。
    tags: [reviews-system, in-depth, eeat]

  # === HCU 系统级（站点级评估）===
  - id: google.hcu.site-level-helpfulness
    source: google-search-central
    source_url: https://developers.google.com/search/blog/2022/08/helpful-content-update
    severity: high
    confidence_default: 0.70
    applies_to:
      page_types: [domain]
      platforms: [google]
    detector:
      type: hybrid
      fn: detectors.google_2024.site_level_hcu_check
      inputs: [page_corpus, visible_text]
    bydfi_business_impact: |
      HCU（Helpful Content Update）是站点级评估：单个低质页面会拖累整站排名。
      BYDFi 需要清理 thin pages / 重复落地页 / SEO 灌水页（V2 加 site-level scan 支持）。
    tags: [hcu, helpful-content, site-level]
