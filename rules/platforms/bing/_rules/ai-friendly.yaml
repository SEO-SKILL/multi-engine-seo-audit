# Bing AI Search Friendliness（ChatGPT Search / Copilot 后台优化）
# 创建：2026-06-10
# ⭐ Will 知识库完全没有这一维度

file_version: "1.0"
file_purpose: "ChatGPT Search / Copilot 引用率优化（Bing 索引 → LLM 抓取）"
maintainer: kelly@bydfi.com
last_reviewed_at: 2026-06-10

chatgpt_search_mechanics:
  index_source: Bing
  retrieval_method: BM25 + neural reranker
  citation_format: 内联链接 + [来源]
  user_clicks: 高（直接点引用源）

rules:

  - id: bing.ai.gptbot-allowed
    source: llm-engine-docs
    source_url: https://platform.openai.com/docs/gptbot
    severity: medium
    confidence_default: 0.99
    applies_to:
      page_types: [all]
      platforms: [bing, llm-engines]
    detector:
      type: hard_rule
      fn: detectors.ai.robots_txt_check
      inputs: [robots_txt_parsed]
      args:
        required_allow_for_ua: [GPTBot, ChatGPT-User, OAI-SearchBot]
        check_block_directives: true
    patch_hint:
      template: patches/allow_gptbot.diff.j2
      priority: P1
      auto_apply: yes_with_diff_preview
    bydfi_business_impact: |
      如果 robots.txt 禁止 GPTBot，ChatGPT Search 完全看不见 BYDFi。
      但要注意：允许 GPTBot 抓取意味着内容会被 OpenAI 用于训练。
      Kelly 需拍板：是否允许训练 vs 仅允许搜索。
    tags: [ai, robots, gptbot]

  - id: bing.ai.claude-bot-allowed
    source: llm-engine-docs
    source_url: https://docs.claude.com/en/docs/agents-and-tools/web-search
    severity: medium
    confidence_default: 0.99
    applies_to:
      page_types: [all]
      platforms: [llm-engines]
    detector:
      type: hard_rule
      fn: detectors.ai.robots_txt_check
      inputs: [robots_txt_parsed]
      args:
        required_allow_for_ua: [ClaudeBot, anthropic-ai, Claude-Web]
    bydfi_business_impact: |
      Claude Code / Claude Web 用户搜索时会触发 ClaudeBot。
      BYDFi 想被 Claude 引用必须放行。
    tags: [ai, robots, claude]

  - id: bing.ai.perplexity-bot-allowed
    source: llm-engine-docs
    severity: medium
    confidence_default: 0.99
    applies_to:
      page_types: [all]
      platforms: [llm-engines]
    detector:
      type: hard_rule
      fn: detectors.ai.robots_txt_check
      inputs: [robots_txt_parsed]
      args:
        required_allow_for_ua: [PerplexityBot]
    bydfi_business_impact: |
      Perplexity 是金融 / 投资类用户重度使用的 AI 搜索。
      不放行 = Perplexity 用户完全看不到 BYDFi。
    tags: [ai, robots, perplexity]

  - id: bing.ai.dense-information-blocks
    source: llm-engine-docs
    severity: medium
    confidence_default: 0.80
    applies_to:
      page_types: [learn, support, faq, tools]
      platforms: [bing, llm-engines]
    detector:
      type: llm_judge
      prompt_template: prompts/ai_dense_info_judge.md
      model: haiku
      inputs: [visible_text, h2_structure]
      args:
        signals:
          - 每个 H2 段落 70-150 字（最易被 AI 摘抄）
          - 关键数据用表格或粗体
          - 段首陈述结论
    bydfi_business_impact: |
      ChatGPT Search 倾向从"短段落 + 高密度信息"提取答案。
      BYDFi 应避免冗长导论，每段直接给答案。
    tags: [ai, content-density]

  - id: bing.ai.schema-for-ai-context
    source: llm-engine-docs
    severity: low
    confidence_default: 0.85
    applies_to:
      page_types: [tools, calculator, learn]
      platforms: [llm-engines]
    detector:
      type: hard_rule
      fn: detectors.ai.schema_ai_friendly_check
      inputs: [jsonld_parsed]
      args:
        encouraged_schemas:
          - HowTo
          - WebApplication
          - SoftwareApplication
          - QAPage
    bydfi_business_impact: |
      AI 抓取时会用 schema 理解页面用途。
      合约工具页应有 SoftwareApplication / WebApplication schema。
      Learn 内容应有 LearningResource schema。
    tags: [ai, schema, structured-data]
