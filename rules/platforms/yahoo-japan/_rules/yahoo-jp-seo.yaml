file_version: "1.0"
maintainer: kelly@example.com
locale_focus: ja
v2_priority: true

rules:
  - id: yahoo-jp.content.japanese-financial-context
    source: third-party-research
    severity: medium
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [yahoo-japan], locales: [ja]}
    detector: {type: llm_judge, prompt_template: prompts/japanese_finance_judge.md, model: sonnet}
    platform_business_impact: "日本金融语境（JPY / 日本金融厅 / 日本税务 20.315%）"
    tags: [yahoo-japan, japanese, finance]

  - id: yahoo-jp.content.jfsa-registration-disclosure
    source: platform-compliance
    severity: high
    confidence_default: 0.90
    applies_to: {page_types: [all], platforms: [yahoo-japan], locales: [ja]}
    detector: {type: hard_rule, fn: detectors.jp.jfsa_disclosure_check, inputs: [page_content]}
    platform_business_impact: "日本金融厅备案状态必须明示"
    tags: [yahoo-japan, jfsa, compliance, regulatory]

  - id: yahoo-jp.content.payjp-bankjp-mention
    source: third-party-research
    severity: low
    confidence_default: 0.80
    applies_to: {page_types: [how-to-buy], platforms: [yahoo-japan], locales: [ja]}
    detector: {type: hard_rule, fn: detectors.jp.payment_method_check, inputs: [page_content]}
    platform_business_impact: "日本用户期望看到 PayPay / 银行汇款等本地支付方式"
    tags: [yahoo-japan, payment, japanese]
