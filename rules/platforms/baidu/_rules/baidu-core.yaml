file_version: "1.0"
maintainer: kelly@bydfi.com
locale_focus: zh-CN
v2_priority: true

rules:
  - id: baidu.compliance.icp-license-missing
    source: bydfi-compliance
    severity: blocker
    confidence_default: 0.99
    applies_to: {page_types: [domain], platforms: [baidu], locales: [zh-CN]}
    detector: {type: hard_rule, fn: detectors.baidu.icp_check, inputs: [page_footer]}
    bydfi_business_impact: "中国大陆要求 ICP 备案，无备案 = 完全无法访问"
    tags: [baidu, icp, china, regulatory]

  - id: baidu.tianwang.spider-allowed
    source: bydfi-compliance
    severity: medium
    confidence_default: 0.99
    applies_to: {page_types: [domain], platforms: [baidu]}
    detector: {type: hard_rule, fn: detectors.baidu.robots_baiduspider_check, inputs: [robots_txt]}
    bydfi_business_impact: "Baiduspider 必须 Allow"
    tags: [baidu, robots]

  - id: baidu.content.simplified-chinese
    source: bydfi-compliance
    severity: medium
    confidence_default: 0.95
    applies_to: {page_types: [all], platforms: [baidu], locales: [zh-CN]}
    detector: {type: hard_rule, fn: detectors.baidu.simplified_chinese_check, inputs: [visible_text]}
    bydfi_business_impact: "百度面向大陆用户，应用简体中文（不是繁体）"
    tags: [baidu, chinese, simplified]
