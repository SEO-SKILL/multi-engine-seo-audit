# ChatGPT Search 引用率规则
# 创建：2026-06-10
# ChatGPT Search 用 Bing 索引 + OpenAI 自家爬虫 SearchGPT

file_version: "1.0"
file_purpose: "ChatGPT Search 引用率优化"
maintainer: kelly@bydfi.com

chatgpt_search_mechanics:
  index_source: Bing + OpenAI SearchGPT bot
  retrieval: BM25 + neural reranker + LLM ranking
  output: 文中嵌入式引用 + 末尾来源列表
  user_intent: 用户期望直接答案，引用源用于事实验证

rules:

  - id: chatgpt.indexability.bot-allowed
    source: llm-engine-docs
    source_url: https://platform.openai.com/docs/gptbot
    severity: medium
    confidence_default: 0.99
    applies_to:
      page_types: [all]
      platforms: [llm-engines]
    detector:
      type: hard_rule
      fn: detectors.ai.robots_txt_check
      inputs: [robots_txt_parsed]
      args:
        required_allow_for_ua:
          - GPTBot          # OpenAI 训练 + 搜索
          - ChatGPT-User    # ChatGPT 即时浏览
          - OAI-SearchBot   # 专用搜索 bot
    bydfi_business_impact: |
      禁 GPTBot = ChatGPT Search 看不见 BYDFi（全球 5 亿月活用户）。
      但允许 = OpenAI 用内容训练。Kelly 拍板。
      建议：允许 ChatGPT-User + OAI-SearchBot（搜索），禁 GPTBot（训练）。
    tags: [chatgpt, robots, bot-access]

  - id: chatgpt.content.direct-answer-format
    source: llm-engine-docs
    severity: medium
    confidence_default: 0.82
    applies_to:
      page_types: [learn, support, faq, tools]
      platforms: [llm-engines]
    detector:
      type: llm_judge
      prompt_template: prompts/chatgpt_answer_format_judge.md
      model: haiku
      inputs: [visible_text, page_purpose]
      args:
        signals:
          - 第一段直接给出答案
          - 后续段落支持论据
          - 关键数字/事实有引用
          - 避免营销话术堵塞
    bydfi_business_impact: |
      ChatGPT 偏好抓"直接答案 + 支持论据"结构。
      BYDFi /learn 内容应改写为"答案先行"风格。
    tags: [chatgpt, content-structure]

  - id: chatgpt.citation-rate-measurement
    source: llm-engine-docs
    severity: info
    confidence_default: 0.85
    applies_to:
      page_types: [all]
      platforms: [llm-engines]
      commands: [audit, watch]
    detector:
      type: external_api
      fn: integrations.chatgpt_search.citation_test
      inputs: [target_keywords, target_url]
      args:
        v1_mode: sampling
        sample_queries_per_url: 3
    bydfi_business_impact: |
      实搜测试：拿主关键词去 ChatGPT Search，看 BYDFi 是否被引用 + 引用位置。
    tags: [chatgpt, citation-rate, measurement]
