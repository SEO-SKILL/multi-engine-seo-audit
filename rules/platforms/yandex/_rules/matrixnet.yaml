# Yandex MatrixNet 算法规则
# 创建：2026-06-10
# ⭐ Will 知识库完全没覆盖 Yandex
# BYDFi 俄罗斯市场（ru locale）必须管，Yandex 占 65%+

file_version: "1.0"
file_purpose: "Yandex 排名因子 + 俄罗斯市场本地化"
maintainer: kelly@bydfi.com
last_reviewed_at: 2026-06-10
source_doc:
  url: https://yandex.com/support/webmaster/
  last_updated: 2025-12-01
  pulled_at: 2026-06-10
locale_focus: ru

yandex_mechanics:
  ranking_algorithm: MatrixNet (gradient boosted decision trees)
  unique_factors:
    - user behavior（停留/回访/CTR 极重要）
    - regional signals（俄罗斯 IP / .ru 域名加分）
    - Yandex.Metrica 数据直接影响排名
    - 外链不重要（与 Google 截然不同）
    - 内容质量人工评估（Y1 algorithm）
  vs_google:
    backlinks: 几乎不看
    user_behavior: 极重（vs Google 中等）
    regional: 极重（vs Google 中等）
    schema: 看（但不如 Google 重）

rules:

  - id: yandex.metrica.not-installed
    source: yandex-webmaster
    severity: medium
    confidence_default: 0.99
    applies_to:
      page_types: [all]
      platforms: [yandex]
      locales: [ru]
    detector:
      type: hard_rule
      fn: detectors.yandex.metrica_check
      inputs: [html_scripts]
      args:
        required_pattern: "mc.yandex.ru/metrika/tag.js"
    patch_hint:
      template: patches/add_yandex_metrica.diff.j2
      priority: P1
    bydfi_business_impact: |
      Yandex.Metrica 数据是 Yandex 排名的重要输入。
      不装 Metrica = Yandex 看不到真实用户行为 = 排名不上去。
      BYDFi 俄文版必须装 Yandex.Metrica，与 GA 并存。
    tags: [yandex-critical, metrica, user-behavior]

  - id: yandex.webmaster.not-verified
    source: yandex-webmaster
    severity: medium
    confidence_default: 0.99
    applies_to:
      page_types: [homepage]
      platforms: [yandex]
      locales: [ru]
    detector:
      type: hard_rule
      fn: detectors.yandex.webmaster_verification_check
      inputs: [domain, dns_records, html_meta]
    patch_hint:
      template: patches/add_yandex_verification.diff.j2
      priority: P1
    bydfi_business_impact: |
      Yandex Webmaster 提供独立的 SEO 数据 + sitemap 提交入口。
      BYDFi ru 版本必须在 Yandex Webmaster 验证。
    tags: [yandex, verification]

  - id: yandex.regional.serving-not-from-russia
    source: yandex-webmaster
    severity: high
    confidence_default: 0.92
    applies_to:
      page_types: [all]
      platforms: [yandex]
      locales: [ru]
    detector:
      type: hard_rule
      fn: detectors.yandex.serving_region_check
      inputs: [http_headers, cdn_region, ip_geolocation]
    bydfi_business_impact: |
      Yandex 强烈偏好俄罗斯境内服务的内容。
      BYDFi ru 页面应通过俄罗斯 PoP 服务（Cloudflare/Akamai 有俄罗斯节点）。
      但注意俄罗斯监管要求 ↑↑↑，可能影响 BYDFi 在俄业务合规。
    tags: [yandex-critical, regional, serving]
    human_review_required: true

  - id: yandex.user-behavior.high-bounce-rate
    source: yandex-webmaster
    severity: high
    confidence_default: 0.88
    applies_to:
      page_types: [news, learn, support, price]
      platforms: [yandex]
      locales: [ru]
    detector:
      type: external_api
      fn: integrations.yandex_metrica.behavior_check
      inputs: [url]
      args:
        red_flag_bounce_rate: 0.75
        red_flag_avg_time_seconds: 30
    bydfi_business_impact: |
      Yandex MatrixNet 极度看重用户行为。
      跳出率 > 75% 或停留 < 30s 的页面会被快速降权。
    tags: [yandex-critical, user-behavior, matrixnet]

  - id: yandex.content.russian-authenticity
    source: yandex-webmaster
    severity: blocker
    confidence_default: 0.85
    applies_to:
      page_types: [all]
      platforms: [yandex]
      locales: [ru]
    detector:
      type: hybrid
      fn: detectors.yandex.russian_authenticity
      inputs: [visible_text, locale, machine_translation_signals]
      args:
        red_flags:
          - 直译痕迹明显
          - 缺少俄罗斯本地化语境
          - 货币错配（不用 RUB 而用 USD/EUR）
          - 缺少 Cyrillic 标点习惯
    llm_judge:
      enabled: true
      when: detector.confidence < 0.80
      prompt_template: prompts/yandex_russian_authenticity_judge.md
      model: sonnet
    patch_hint:
      template: patches/yandex_russian_rewrite.md.j2
      priority: P0
      auto_apply: false
      requires_review: true
    bydfi_business_impact: |
      Yandex 完全无法容忍机翻俄文。
      机翻俄文页直接被 MatrixNet 视为低质 → 不参与排名。
      必须真俄罗斯本土化内容。
    tags: [yandex-critical, russian, localization]
    human_review_required: true

  - id: yandex.title.russian-keyword-density
    source: yandex-webmaster
    severity: low
    confidence_default: 0.80
    applies_to:
      page_types: [all]
      platforms: [yandex]
      locales: [ru]
    detector:
      type: hard_rule
      fn: detectors.yandex.title_russian_quality
      inputs: [title, target_keyword_ru]
      args:
        keyword_in_first_60_chars: true
        no_keyword_stuffing: true
    bydfi_business_impact: |
      Yandex 对 title 中的俄文关键词位置敏感。
      关键词必须在前 60 字符出现。
    tags: [yandex, title, russian]
