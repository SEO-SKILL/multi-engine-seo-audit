file_version: "1.0"
maintainer: kelly@bydfi.com

rules:
  - id: bydfi.price.data-source-not-cited
    source: bydfi-compliance
    severity: medium
    confidence_default: 0.93
    applies_to: {page_types: [price], platforms: [bydfi, google]}
    detector: {type: hard_rule, fn: detectors.bydfi.price_source_check, inputs: [page_content]}
    bydfi_business_impact: "价格数据必须标来源（CoinGecko / Etherscan）"
    tags: [bydfi, price-page, fact-citation]

  - id: bydfi.price.deviation-from-source
    source: bydfi-compliance
    severity: high
    confidence_default: 0.92
    applies_to: {page_types: [price], platforms: [bydfi]}
    detector: {type: external_api, fn: integrations.coingecko.deviation_check, inputs: [coin, page_price]}
    bydfi_business_impact: "价格偏差 > 5% 说明数据质量有问题"
    tags: [bydfi, price-page, data-quality]

  - id: bydfi.price.no-risk-disclaimer
    source: bydfi-compliance
    severity: high
    confidence_default: 0.95
    applies_to: {page_types: [price], platforms: [bydfi]}
    detector: {type: hard_rule, fn: detectors.bydfi.has_risk_disclaimer, inputs: [page_content]}
    bydfi_business_impact: "币种页必备风险提示"
    tags: [bydfi, price-page, compliance]

  - id: bydfi.price.prediction-language
    source: bydfi-compliance
    severity: blocker
    confidence_default: 0.85
    applies_to: {page_types: [price], platforms: [bydfi]}
    detector: {type: llm_judge, prompt_template: prompts/price_prediction_judge.md, model: haiku}
    bydfi_business_impact: "禁止暗示'必涨/必跌/X 年内到 100K'类预测"
    tags: [bydfi, price-page, compliance, regulatory]

  - id: bydfi.price.k-line-source-missing
    source: bydfi-compliance
    severity: medium
    confidence_default: 0.88
    applies_to: {page_types: [price], platforms: [bydfi]}
    detector: {type: hard_rule, fn: detectors.bydfi.k_line_metadata, inputs: [page_charts]}
    bydfi_business_impact: "K 线图必须标数据源 + 时间戳精确到秒"
    tags: [bydfi, price-page, chart]
