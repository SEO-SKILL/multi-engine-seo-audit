file_version: "1.0"
maintainer: kelly@bydfi.com

rules:
  - id: bydfi.referral.affiliate-disclosure
    source: bydfi-compliance
    severity: medium
    confidence_default: 0.93
    applies_to: {page_types: [crypto-review, compare], platforms: [bydfi]}
    detector: {type: hard_rule, fn: detectors.bydfi.affiliate_disclosure_check, inputs: [page_content]}
    bydfi_business_impact: "联盟链接必须有利益冲突声明（FTC + Google YMYL 要求）"
    tags: [bydfi, affiliate, disclosure, ymyl]

  - id: bydfi.referral.kol-disclosure
    source: bydfi-compliance
    severity: medium
    confidence_default: 0.85
    applies_to: {page_types: [news, blog], platforms: [bydfi]}
    detector: {type: llm_judge, prompt_template: prompts/kol_disclosure_judge.md, model: haiku}
    bydfi_business_impact: "KOL 合作内容必须明示'赞助内容'/sponsored"
    tags: [bydfi, kol, disclosure]

  - id: bydfi.referral.airdrop-promo-compliance
    source: bydfi-compliance
    severity: high
    confidence_default: 0.85
    applies_to: {page_types: [news, blog], platforms: [bydfi]}
    detector: {type: llm_judge, prompt_template: prompts/airdrop_compliance_judge.md, model: haiku}
    bydfi_business_impact: "空投活动页避免暗示保证收益"
    tags: [bydfi, airdrop, compliance]
