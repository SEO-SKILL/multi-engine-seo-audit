file_version: "1.0"
maintainer: kelly@bydfi.com

rules:
  - id: bydfi.learn.audience-not-specified
    source: bydfi-compliance
    severity: low
    confidence_default: 0.80
    applies_to: {page_types: [learn], platforms: [bydfi, google]}
    detector: {type: llm_judge, prompt_template: prompts/audience_clarity_judge.md, model: haiku}
    bydfi_business_impact: "Learn 内容必须明示受众（新手/高频/机构）"
    tags: [bydfi, learn-center, audience]

  - id: bydfi.learn.no-prerequisite-link
    source: bydfi-compliance
    severity: low
    confidence_default: 0.78
    applies_to: {page_types: [learn], platforms: [bydfi]}
    detector: {type: hard_rule, fn: detectors.bydfi.learn_prerequisite_check, inputs: [internal_links]}
    bydfi_business_impact: "进阶 Learn 应链接前置知识页"
    tags: [bydfi, learn-center, learning-path]

  - id: bydfi.learn.no-platform-specific-data
    source: bydfi-compliance
    severity: medium
    confidence_default: 0.75
    applies_to: {page_types: [learn], platforms: [bydfi]}
    detector: {type: llm_judge, prompt_template: prompts/platform_specific_data_judge.md, model: haiku}
    bydfi_business_impact: "Learn 内容应有 BYDFi 平台特定数据（费率/规则/案例）"
    tags: [bydfi, learn-center, originality]

  - id: bydfi.learn.no-glossary-link
    source: bydfi-compliance
    severity: low
    confidence_default: 0.85
    applies_to: {page_types: [learn], platforms: [bydfi]}
    detector: {type: hard_rule, fn: detectors.bydfi.glossary_link_check, inputs: [internal_links]}
    bydfi_business_impact: "首次出现的专业术语应链接到 glossary"
    tags: [bydfi, learn-center, internal-linking]
