file_version: "1.0"
file_purpose: "V2 跨国合规自动同步规则（US-SEC / EU-MiCA / SG-MAS / JP-JFSA / HK-SFC）"
maintainer: kelly@bydfi.com

rules:
  - id: bydfi.compliance.us-sec-unregistered-security-mention
    source: bydfi-compliance
    severity: blocker
    confidence_default: 0.92
    applies_to: {page_types: [all], platforms: [bydfi, google], locales: [en]}
    detector: {type: llm_judge, prompt_template: prompts/us_sec_compliance_judge.md, model: sonnet}
    bydfi_business_impact: "面向美国市场内容不能暗示'未注册证券'类违规"
    tags: [compliance, us-sec, regulatory, v2]
    human_review_required: true

  - id: bydfi.compliance.eu-mica-stablecoin-statements
    source: bydfi-compliance
    severity: high
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [bydfi], locales: [en, pt, es]}
    detector: {type: llm_judge, prompt_template: prompts/eu_mica_judge.md, model: sonnet}
    bydfi_business_impact: "MiCA 法规：稳定币说明必须明示发行方+合规状态"
    tags: [compliance, eu-mica, regulatory, v2]

  - id: bydfi.compliance.jp-jfsa-registration-status
    source: bydfi-compliance
    severity: high
    confidence_default: 0.90
    applies_to: {page_types: [all], platforms: [bydfi], locales: [ja]}
    detector: {type: hard_rule, fn: detectors.compliance.jfsa_status_check, inputs: [page_content]}
    bydfi_business_impact: "日本金融厅备案状态必须明示"
    tags: [compliance, jp-jfsa, regulatory, v2]

  - id: bydfi.compliance.sg-mas-restricted-activity
    source: bydfi-compliance
    severity: high
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [bydfi], locales: [en, zh-CN]}
    detector: {type: llm_judge, prompt_template: prompts/sg_mas_judge.md, model: haiku}
    bydfi_business_impact: "新加坡 MAS 限制活动必须正确分类"
    tags: [compliance, sg-mas, regulatory, v2]

  - id: bydfi.compliance.hk-sfc-licensed-activity
    source: bydfi-compliance
    severity: high
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [bydfi], locales: [en, zh-CN]}
    detector: {type: llm_judge, prompt_template: prompts/hk_sfc_judge.md, model: haiku}
    bydfi_business_impact: "香港 SFC VATP 牌照活动必须正确披露"
    tags: [compliance, hk-sfc, regulatory, v2]
