file_version: "1.0"
maintainer: kelly@example.com

rules:
  - id: shared.security.mixed-content
    source: google-search-central
    severity: high
    confidence_default: 0.99
    applies_to: {page_types: [all], platforms: [shared]}
    detector: {type: hard_rule, fn: detectors.security.mixed_content_check, inputs: [resources]}
    platform_business_impact: "HTTPS 页面引用 HTTP 资源 = 浏览器警告 + SEO 影响"
    tags: [security, https, mixed-content]

  - id: shared.security.hsts-missing
    source: google-search-central
    severity: medium
    confidence_default: 0.95
    applies_to: {page_types: [all], platforms: [shared]}
    detector: {type: hard_rule, fn: detectors.security.hsts_header_check, inputs: [http_headers]}
    platform_business_impact: "Strict-Transport-Security 必备（金融站点）"
    tags: [security, hsts]

  - id: shared.security.csp-missing
    source: google-search-central
    severity: low
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [shared]}
    detector: {type: hard_rule, fn: detectors.security.csp_check, inputs: [http_headers]}
    platform_business_impact: "Content-Security-Policy 防 XSS"
    tags: [security, csp]

  - id: shared.security.ssl-expiry-soon
    source: google-search-central
    severity: high
    confidence_default: 0.99
    applies_to: {page_types: [domain], platforms: [shared]}
    detector: {type: hard_rule, fn: detectors.security.ssl_expiry_check, inputs: [ssl_cert]}
    platform_business_impact: "SSL 证书 30 天内过期 = 即将全站不可访问"
    tags: [security, ssl]

  - id: shared.security.hacked-content
    source: google-spam-policy
    severity: blocker
    confidence_default: 0.90
    applies_to: {page_types: [all], platforms: [shared, google]}
    detector: {type: hybrid, fn: detectors.security.hacked_content_check, inputs: [page_content]}
    platform_business_impact: "被黑塞菠菜/赌博/色情 = Google 立即处置"
    tags: [security, hacked, critical]
