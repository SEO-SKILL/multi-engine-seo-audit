# Schema 页面级最佳组合
# 创建：2026-06-10
# 不是单点 schema 字段缺失，而是 schema 整体策略是否完整

file_version: "1.0"
maintainer: kelly@example.com

composite_weights:
  ssr_not_csr_only:           0.25  # 必须 SSR 输出（某加密交易所案例 L04 同源）
  breadcrumb_list:            0.15
  organization_or_website:    0.15
  article_schema:             0.10
  sameas_links:               0.10
  aggregaterating_grounded:   0.25  # 字段必须对应可见内容（某加密交易所案例 L04 同源）

rules:

  - id: shared.schema.page-composite-incomplete
    source: google-search-central
    severity: high
    confidence_default: 0.85
    applies_to:
      page_types: [all]
      platforms: [google, shared, platform]
      commands: [audit, gate, watch]
    detector:
      type: hybrid
      fn: detectors.composite.schema_composite_quality
      inputs: [raw_html, rendered_html]
      args:
        threshold_low: 0.50
        threshold_pass: 0.70
    patch_hint:
      template: patches/schema_composite_remediation.md.j2
      priority: P1
    platform_business_impact: |
      Schema 综合分 < 0.50 = SSR 缺失 + 字段虚假同时存在 = 某加密交易所行业案例同源风险。
    tags: [schema, composite, case-exchange-related]

  - id: shared.schema.page-composite-fake-rating
    source: platform-incident
    severity: blocker
    confidence_default: 0.92
    applies_to:
      page_types: [all]
      platforms: [google, platform]
    detector:
      type: hybrid
      fn: detectors.composite.schema_composite_quality
      inputs: [raw_html, rendered_html]
      args:
        fail_if_fake_rating: true
    platform_business_impact: |
      AggregateRating 字段虚假 = 某加密交易所行业案例 L04 同源 = 立即 manual action。
      Composite 直接降到 0。
    tags: [schema, composite, case-exchange-critical, blocker]
    human_review_required: true
