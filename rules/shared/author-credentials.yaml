file_version: "1.0"
maintainer: kelly@example.com

rules:
  - id: shared.author.bio-page-missing
    source: google-search-central
    severity: medium
    confidence_default: 0.92
    applies_to: {page_types: [news, blog, learn, crypto-review], platforms: [shared]}
    detector: {type: hard_rule, fn: detectors.eeat.author_bio_page_check, inputs: [author_url, fetched_author_page]}
    platform_business_impact: "作者必须有独立 bio 页（YMYL 强信号）"
    tags: [eeat, author, ymyl]

  - id: shared.author.credentials-not-stated
    source: google-search-central
    severity: medium
    confidence_default: 0.78
    applies_to: {page_types: [crypto-review, learn], platforms: [shared]}
    detector: {type: llm_judge, prompt_template: prompts/author_credentials_judge.md, model: haiku}
    platform_business_impact: "金融/加密内容作者应说明资质（CFA / SEC / 法律顾问 / 5+ 年经验）"
    tags: [eeat, credentials, ymyl]

  - id: shared.author.no-social-link
    source: google-search-central
    severity: low
    confidence_default: 0.85
    applies_to: {page_types: [news, blog], platforms: [shared]}
    detector: {type: hard_rule, fn: detectors.eeat.author_social_check, inputs: [author_metadata]}
    platform_business_impact: "作者社交链接（LinkedIn/Twitter）= 真实身份信号"
    tags: [eeat, author, social]

  - id: shared.author.reviewed-by-missing
    source: google-search-central
    severity: medium
    confidence_default: 0.88
    applies_to: {page_types: [learn, support, crypto-review], platforms: [shared]}
    detector: {type: hard_rule, fn: detectors.eeat.reviewer_check, inputs: [page_content, jsonld]}
    platform_business_impact: "YMYL 内容必须有 'Reviewed by' 字段"
    tags: [eeat, reviewer, ymyl]
