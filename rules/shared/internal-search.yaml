file_version: "1.0"
maintainer: kelly@bydfi.com

rules:
  - id: shared.internal-search.indexed-result-pages
    source: google-search-central
    severity: medium
    confidence_default: 0.90
    applies_to: {page_types: [search], platforms: [shared, google]}
    detector: {type: hard_rule, fn: detectors.search.indexability_check, inputs: [url_pattern, meta_robots]}
    bydfi_business_impact: "站内搜索结果页应 noindex（避免薄内容污染索引）"
    tags: [internal-search, indexability]

  - id: shared.internal-search.no-search-action-schema
    source: google-search-central
    severity: info
    confidence_default: 0.90
    applies_to: {page_types: [homepage], platforms: [shared, google]}
    detector: {type: hard_rule, fn: detectors.schema.sitelinks_searchbox_check, inputs: [jsonld]}
    bydfi_business_impact: "SearchAction schema 让 Google SERP 显示搜索框"
    tags: [internal-search, schema]

  - id: shared.internal-search.faceted-navigation-explosion
    source: google-search-central
    severity: medium
    confidence_default: 0.85
    applies_to: {page_types: [all], platforms: [shared, google]}
    detector: {type: hard_rule, fn: detectors.search.faceted_navigation_check, inputs: [url_inventory]}
    bydfi_business_impact: "faceted 过滤生成大量 URL 必须管控（canonical / noindex）"
    tags: [internal-search, faceted-navigation]
