file_version: "1.0"
file_purpose: "Web3 / 加密垂直专属规则"
maintainer: kelly@example.com

rules:
  - id: platform.web3.contract-address-not-linked
    source: platform-compliance
    severity: low
    confidence_default: 0.95
    applies_to:
      page_types: [news, learn, price]
      platforms: [platform, google]
    detector:
      type: hard_rule
      fn: detectors.web3.contract_address_link_check
      inputs: [visible_text, dom_links]
      args:
        link_target: etherscan_or_bscscan
    platform_business_impact: |
      合约地址应该 link 化（指向 Etherscan / BscScan / Solscan）。
      可验证性 = Web3 用户信任基础。
    tags: [web3, contract-address, verifiability]

  - id: platform.web3.chain-name-disambiguation
    source: platform-compliance
    severity: medium
    confidence_default: 0.85
    applies_to:
      page_types: [news, learn]
      platforms: [platform, google]
    detector:
      type: llm_judge
      prompt_template: prompts/chain_disambiguation_judge.md
      model: haiku
      inputs: [visible_text]
      args:
        chains: [Ethereum, BSC, Solana, Polygon, Avalanche, Arbitrum, Optimism, Base]
    platform_business_impact: |
      "ETH" 在文中应明示是 Ethereum 链 vs ETH 代币。
      避免主题混淆。
    tags: [web3, chain-name]

  - id: platform.web3.token-symbol-with-chain
    source: platform-compliance
    severity: low
    confidence_default: 0.88
    applies_to:
      page_types: [news, learn, price]
      platforms: [platform]
    detector:
      type: llm_judge
      prompt_template: prompts/token_symbol_chain_judge.md
      model: haiku
      inputs: [visible_text, tokens_mentioned]
    platform_business_impact: |
      同一 token symbol 可能存在多链（如 USDT on ETH/Tron/BSC）。
      首次提及应明示链。
    tags: [web3, token-chain]

  - id: platform.web3.defi-data-source-citation
    source: platform-compliance
    severity: medium
    confidence_default: 0.82
    applies_to:
      page_types: [news, learn]
      platforms: [platform, google, llm-engines]
    detector:
      type: hard_rule
      fn: detectors.web3.defi_data_citation_check
      inputs: [visible_text, citations]
      args:
        encouraged_sources: [CoinGecko, CoinMarketCap, DefiLlama, Etherscan, Dune]
    platform_business_impact: |
      引用 DeFi 数据必须有来源（CoinGecko / DefiLlama / Etherscan）。
      Will 知识库强调 fact-verifiability，加密类必须严格。
    tags: [web3, defi, verifiability]
