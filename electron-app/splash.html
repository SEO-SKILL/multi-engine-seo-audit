<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Multi-Engine SEO Audit 启动中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-app-region: drag; user-select: none; }
  body {
    font-family: -apple-system, "SF Pro Display", "Microsoft Yahei", system-ui, sans-serif;
    background: linear-gradient(135deg, #FF6B00 0%, #FF8533 100%);
    color: #fff;
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px;
  }
  .logo-img { width: 96px; height: 96px; margin-bottom: 18px; filter: drop-shadow(0 4px 14px rgba(0,0,0,.25)); border-radius: 18px; background: rgba(255,255,255,.92); padding: 8px; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
  .subtitle { font-size: 13px; opacity: .9; margin-bottom: 24px; letter-spacing: .3px; }
  .progress { width: 240px; height: 4px; background: rgba(255,255,255,.25); border-radius: 2px; overflow: hidden; }
  .progress-bar {
    height: 100%; background: white; border-radius: 2px;
    animation: slide 1.6s ease-in-out infinite;
  }
  @keyframes slide {
    0% { transform: translateX(-100%); width: 30%; }
    50% { width: 60%; }
    100% { transform: translateX(340%); width: 30%; }
  }
  .status { font-size: 12px; opacity: .85; margin-top: 18px; }
  .version { position: fixed; bottom: 12px; right: 14px; font-size: 11px; opacity: .65; }
</style>
</head>
<body>
  <img class="logo-img" src="logo.png" alt="Platform" />
  <h1>Multi-Engine SEO Audit</h1>
  <div class="subtitle">深度审计 · 防 Manual Action · 多搜索引擎</div>
  <div class="progress"><div class="progress-bar"></div></div>
  <div class="status">正在加载 442+ 规则 + 22 agents...</div>
  <div class="version">v1.0.0</div>
</body>
</html>
