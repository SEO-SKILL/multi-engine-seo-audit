app = "multi-engine-seo-audit"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"
HOST = "0.0.0.0"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
